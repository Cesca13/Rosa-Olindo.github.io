<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C'è Posta Per Te 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    padding: 24px 0;
  }

  /* Sfondo sfocato tipo studio TV */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(180,0,0,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 50%, rgba(255,200,0,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Particelle romantiche */
  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .heart {
    position: absolute;
    bottom: -50px;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-110vh) rotate(360deg); }
  }

  .container {
    max-width: 680px;
    width: 100%;
    padding: 24px;
    text-align: center;
    z-index: 1;
  }

  /* Logo C'è posta */
  .show-logo {
    margin-bottom: 32px;
  }

  .show-logo .title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(28px, 7vw, 52px);
    color: #fff;
    text-shadow: 0 0 40px rgba(255,100,100,0.5);
    line-height: 1.1;
  }

  .show-logo .subtitle {
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #c00;
    margin-top: 4px;
  }

  .divider-red {
    width: 60px;
    height: 2px;
    background: #c00;
    margin: 16px auto;
  }

  /* Busta */
  .envelope-wrap {
    margin: 0 auto 32px;
    position: relative;
    display: inline-block;
  }

  .envelope {
    width: clamp(260px, 70vw, 380px);
    height: clamp(170px, 45vw, 250px);
    background: linear-gradient(160deg, #f5e6cc, #e8d0a8);
    border-radius: 8px;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(200,0,0,0.2);
    cursor: pointer;
    transition: transform 0.3s;
    overflow: hidden;
  }

  .envelope:hover { transform: scale(1.02); }

  /* Flap superiore */
  .flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(160deg, #e8c88a, #d4a857);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transition: transform 0.6s ease, opacity 0.6s ease;
    transform-origin: top center;
    z-index: 2;
  }

  .envelope.open .flap {
    transform: rotateX(180deg);
    opacity: 0;
  }

  /* Lati busta */
  .flap-left {
    position: absolute;
    bottom: 0; left: 0;
    width: 55%;
    height: 60%;
    background: linear-gradient(135deg, #d4a857, #c49040);
    clip-path: polygon(0 100%, 100% 100%, 0 0);
    z-index: 1;
  }

  .flap-right {
    position: absolute;
    bottom: 0; right: 0;
    width: 55%;
    height: 60%;
    background: linear-gradient(225deg, #c49040, #b8822e);
    clip-path: polygon(100% 100%, 0 100%, 100% 0);
    z-index: 1;
  }

  /* Sigillo */
  .seal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #c00, #800);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    z-index: 3;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    transition: opacity 0.3s;
  }

  .envelope.open .seal { opacity: 0; }

  /* Lettera che esce */
  .letter {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    width: 85%;
    background: #fff;
    border-radius: 4px;
    padding: 16px;
    z-index: 1;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  .envelope.open .letter {
    transform: translateX(-50%) translateY(-120%);
  }

  .letter-content {
    font-size: 10px;
    color: #333;
    line-height: 1.4;
    font-style: italic;
  }

  /* Card principale */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 36px 32px;
    backdrop-filter: blur(10px);
    margin-top: 8px;
  }

  .from-to {
    margin-bottom: 24px;
  }

  .from-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
  }

  .from-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #ccc;
  }

  .arrow {
    font-size: 28px;
    margin: 12px 0;
    color: #c00;
  }

  .to-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
  }

  .to-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,200,200,0.3);
  }

  /* Sposi illustrazione */
  .sposi {
    font-size: clamp(60px, 15vw, 90px);
    margin: 20px 0;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    animation: bounce 2s ease infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  /* Pulsante audio */
  .audio-section {
    margin-top: 24px;
  }

  .audio-hint {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
    font-style: italic;
  }

  .play-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #c00, #900);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(200,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 32px rgba(200,0,0,0.6);
  }

  .play-btn:active { transform: scale(0.98); }

  .play-btn.playing {
    background: linear-gradient(135deg, #222, #111);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .play-icon {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  /* Barra progresso */
  .progress-wrap {
    margin-top: 16px;
    display: none;
  }

  .progress-wrap.show { display: block; }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c00, #ff4444);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
  }

  .time-label {
    font-size: 11px;
    color: #666;
    text-align: right;
  }

  /* Onde audio animate */
  .waves {
    display: none;
    align-items: center;
    gap: 3px;
    height: 20px;
  }

  .waves.show { display: flex; }

  .wave-bar {
    width: 3px;
    background: #fff;
    border-radius: 2px;
    animation: wave 0.6s ease infinite alternate;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s;    height: 6px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s;  height: 14px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s;  height: 20px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s;  height: 12px; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; height: 8px; }

  @keyframes wave {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1.2); }
  }

/* Schermata di ingresso */
  #entryScreen {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: pointer;
  }

  #entryScreen .entry-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(28px, 7vw, 52px);
    color: #fff;
    text-shadow: 0 0 40px rgba(255,100,100,0.5);
    margin-bottom: 16px;
  }

  #entryScreen .entry-btn {
    background: linear-gradient(135deg, #c00, #900);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(200,0,0,0.4);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(200,0,0,0.4); }
    50%       { box-shadow: 0 4px 40px rgba(200,0,0,0.7); }
  }

  .footer-note {
    margin-top: 24px;
    font-size: 11px;
    color: #444;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- Schermata ingresso -->
<div id="entryScreen">
  <div class="entry-title">C'è Posta Per Te</div>
  <button class="entry-btn" onclick="enterPage()">💌 Apri la lettera</button>
  <div class="entry-note" style="margin-top: 10px;">Attiva l'audio prima di entrare!</div>
</div>

<div class="hearts" id="hearts"></div>

<div class="container">

  <!-- Logo show -->
  <div class="show-logo">
    <div class="title">C'è Posta Per Te</div>
    <div class="divider-red"></div>
  </div>


  <!-- Card contenuto -->
  <div class="card">
    <div class="from-to">
      <div class="from-label">Da parte di</div>
      <div class="from-name">Maria De Filippi</div>
      <div class="arrow">↓</div>
      <div class="to-label">Per</div>
      <div class="to-name">Adri & Davide 💍</div>
    </div>

    <!-- Busta animata -->
    <div class="envelope-wrap">
      <div class="envelope" id="envelope" onclick="openEnvelope()">
        <div class="flap"></div>
        <div class="flap-left"></div>
        <div class="flap-right"></div>
        <div class="seal">💌</div>
      </div>
    </div>

    <!-- Audio -->
    <div class="audio-section">
      <div class="audio-hint">C'è un messaggio speciale per voi...</div>
      <button class="play-btn" id="playBtn" onclick="toggleAudio()">
        <div class="play-icon">
          <div class="waves" id="waves">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <span id="playIcon">▶</span>
        </div>
        <span id="playText">Ascolta il messaggio</span>
      </button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-label" id="timeLabel">0:00</div>
      </div>
    </div>
  </div>

  <div class="footer-note">· C'è Posta Per Te · Una serata speciale</div>

</div>

<audio id="audio" src="audio.m4a" preload="auto"></audio>
<audio id="sigla" src="sigla.mp3" preload="auto" loop></audio>

<script>
// ── Cuoricini fluttuanti ────────────────────────────────────
const heartsContainer = document.getElementById('hearts');
const emojis = ['❤️','💕','💖','💗','💝','🌹','✨'];

function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.fontSize = (14 + Math.random() * 16) + 'px';
  const dur = 4 + Math.random() * 5;
  h.style.animationDuration = dur + 's';
  h.style.animationDelay = Math.random() * 2 + 's';
  heartsContainer.appendChild(h);
  setTimeout(() => h.remove(), (dur + 2) * 1000);
}

setInterval(spawnHeart, 600);

// ── Sigla sottofondo ────────────────────────────────────────
const sigla = document.getElementById('sigla');
sigla.volume = 0.25;

function enterPage() {
  sigla.play().catch(() => {});
  document.getElementById('entryScreen').style.display = 'none';
}

// ── Busta ───────────────────────────────────────────────────
let envelopeOpened = false;
function openEnvelope() {
  if (envelopeOpened) return;
  envelopeOpened = true;
  document.getElementById('envelope').classList.add('open');
}

// ── Audio ───────────────────────────────────────────────────
const audio       = document.getElementById('audio');
const playBtn     = document.getElementById('playBtn');
const playIcon    = document.getElementById('playIcon');
const playText    = document.getElementById('playText');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const timeLabel   = document.getElementById('timeLabel');
const waves       = document.getElementById('waves');
let playing = false;

function toggleAudio() {
  openEnvelope();
  if (!playing) {
    audio.play();
    playing = true;
    sigla.volume = 0.05; // abbassa la sigla durante il messaggio
    playBtn.classList.add('playing');
    playIcon.style.display = 'none';
    waves.classList.add('show');
    playText.textContent = 'In ascolto...';
    progressWrap.classList.add('show');
  } else {
    audio.pause();
    playing = false;
    sigla.volume = 0.25; // ripristina volume sigla
    playBtn.classList.remove('playing');
    playIcon.style.display = 'block';
    waves.classList.remove('show');
    playText.textContent = 'Ascolta il messaggio';
  }
}

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    const m = Math.floor(audio.currentTime / 60);
    const s = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
    timeLabel.textContent = m + ':' + s;
  }
});

audio.addEventListener('ended', () => {
  playing = false;
  sigla.volume = 0.25; // ripristina volume sigla
  playBtn.classList.remove('playing');
  playIcon.style.display = 'block';
  waves.classList.remove('show');
  playText.textContent = '▶ Riascolta';
  progressFill.style.width = '100%';
});
</script>
</body>
</html>
